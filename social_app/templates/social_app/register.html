{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja</title>
    <link rel="stylesheet" type="text/css" href="{% static 'social_app/style.css' %}">
</head>
<body>

<header>
    <h1>Mini Social Media</h1>
    <a href="{% url 'login' %}">Logowanie</a>
</header>

<div class="container">
    <h2>Rejestracja</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Zarejestruj się</button>
    </form>
    <p>Masz konto? <a href="{% url 'login' %}">Zaloguj się</a></p>
</div>

</body>
</html>
